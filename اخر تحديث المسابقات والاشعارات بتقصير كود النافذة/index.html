<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>مَتْجَرُ أُمِّ رُوْح 🌸</title>
    <!-- PWA Support Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d97706" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="متجر أم روح" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      // Capture the beforeinstallprompt event as early as possible
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        // Dispatch custom event so React can pick it up immediately
        window.dispatchEvent(new CustomEvent('global-beforeinstallprompt', { detail: e }));
        console.log('⚡ Early PWA beforeinstallprompt event captured and stored globally!');
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #ffffff; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; direction: rtl;" id="initial-loading-container">
        <style>
          .pulse-dot {
            width: 14px;
            height: 14px;
            background-color: #d97706;
            border-radius: 50%;
            margin: 0 5px;
            animation: pulse-dot-anim 1.2s infinite ease-in-out;
          }
          .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
          .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
          @keyframes pulse-dot-anim {
            0%, 100% { transform: scale(0.6); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 1; }
          }
          @keyframes heartbeat-anim {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
          }
        </style>
        <div style="font-size: 54px; margin-bottom: 20px; animation: heartbeat-anim 1.6s infinite ease-in-out; user-select: none;">🌸</div>
        <h2 style="font-size: 18px; font-weight: 800; color: #451a03; margin: 0 0 8px 0; text-align: center;">مرحباً بكِ في متجر أم روح 🌸</h2>
        <p style="font-size: 12px; color: #78716c; margin: 0 0 20px 0; font-weight: 600; text-align: center;">جاري تفعيل وعرض الكتالوج والمستشارة روح... ✨</p>
        <div style="display: flex; justify-content: center; align-items: center;">
          <div class="pulse-dot"></div>
          <div class="pulse-dot"></div>
          <div class="pulse-dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
